<form action="/enviar" method="POST" enctype="multipart/form-data"> 
    <fieldset> <legend>Datos Personales</legend>

        <label for="user">Nombre:</label> 
        <input type="text" id="user" name="user" required minlength="3" placeholder="Tu nombre..."> 
        <label for="edad">Edad:</label>
        <input type="number" id="edad" name="edad" min="18" max="99"> 
        <label for="foto">Sube tu foto:</label>
        <input type="file" id="foto" name="foto"> <label for="paises">Elige países:</label>
        <select id="paises" name="paises" multiple> 
            <option value="es">España</option>
            <option value="mx">México</option>
        </select>

        <label>Intereses:</label>
        <input type="checkbox" name="int" value="web"> Web <label>Género:</label>
        <input type="radio" name="gen" value="h"> Hombre <label for="bio">Biografía:</label>
        <textarea id="bio" rows="4" cols="50"></textarea> <button type="submit">Enviar</button> <button type="reset">Limpiar</button> </fieldset>

</form>
